<app-checkbox [checked]="done()" [color]="checkboxColor()" (checkedChange)="onToggleDone($event)" />

<p
  class="min-w-0 flex-1 type-task-title text-primary"
  [class.line-through]="done()"
  [class.text-muted]="done()"
>
  {{ todo().title }}
</p>

<div class="flex flex-shrink-0 items-center gap-2">
  <app-dot [color]="priorityColor()" />
  @if (todo().dueDate) {
    <span class="type-meta text-muted">{{ todo().dueDate | date: 'MMM d' }}</span>
  }
</div>
