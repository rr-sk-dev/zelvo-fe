<h1>My tasks</h1>
<app-tasks-counter></app-tasks-counter>
<app-tasks-list></app-tasks-list>

<section>
  <p>Quick add a task...</p>
  <button (click)="addTask()">Add</button>
</section>

@if (showCreate()) {
  <div class="scrim" (click)="closeCreate()"></div>
  <div
    class="sheet"
    role="dialog"
    aria-modal="true"
    aria-label="New task"
    (document:keydown.escape)="closeCreate()"
  >
    <span class="sheet-handle" aria-hidden="true"></span>
    <app-tasks-create (close)="closeCreate()"></app-tasks-create>
  </div>
}
