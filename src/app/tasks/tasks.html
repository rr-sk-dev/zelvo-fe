<div class="min-h-dvh px-6 pt-10">
  <header>
    <h1 class="type-page-title text-primary">My tasks</h1>
    <app-tasks-counter></app-tasks-counter>
  </header>

  <button
    type="button"
    (click)="addTask()"
    class="mt-8 flex w-full items-center gap-4 rounded-card border border-default bg-card px-4 py-3 text-left focus-visible:focus-ring"
  >
    <app-dashed-circle [size]="40" aria-hidden="true" />
    <span class="flex-1 type-body text-secondary">Quick add a task...</span>
    <span
      class="rounded-field bg-accent px-5 py-3 type-task-title font-semibold text-background"
      aria-hidden="true"
    >
      Add
    </span>
  </button>

  <app-tasks-list></app-tasks-list>
</div>

<dialog
  #createDialog
  class="sheet"
  aria-label="New task"
  (close)="closeCreate()"
  (click)="onBackdropClick($event)"
>
  @if (showCreate()) {
    <div class="sheet-panel">
      <span class="sheet-handle" aria-hidden="true"></span>
      <app-tasks-create (close)="closeCreate()" />
    </div>
  }
</dialog>
