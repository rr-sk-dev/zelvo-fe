<p class="type-section-label text-muted">New Task</p>

<form (submit)="createTask(); $event.preventDefault()" class="mt-5 flex flex-col gap-5">
  <div class="flex flex-col gap-2">
    <label for="title" class="type-body text-secondary">Title</label>
    <input
      id="title"
      type="text"
      [formField]="taskForm.title"
      placeholder="What needs doing?"
      class="rounded-field border border-default bg-field px-4 py-3 type-task-title text-primary placeholder:text-muted focus-visible:focus-ring"
    />
    @if (taskForm.title().touched() && taskForm.title().errors().length) {
      <p class="type-body text-priority-high">{{ taskForm.title().errors()[0].message }}</p>
    }
  </div>

  <div class="flex flex-col gap-2">
    <label for="description" class="type-body text-secondary">Description</label>
    <textarea
      id="description"
      [formField]="taskForm.description"
      rows="4"
      placeholder="Optional"
      class="resize-none rounded-field border border-default bg-field px-4 py-3 type-task-title text-primary placeholder:text-muted focus-visible:focus-ring"
    ></textarea>
  </div>

  <app-segmented-select
    legend="Priority"
    [options]="priorityOptions"
    [formField]="taskForm.priority"
  />

  <div class="mt-1 flex gap-3">
    <button
      type="submit"
      [disabled]="taskForm().invalid()"
      class="flex-1 rounded-field bg-accent px-5 py-4 type-task-title font-semibold text-background focus-visible:focus-ring disabled:opacity-50"
    >
      Create
    </button>
    <button
      type="button"
      (click)="cancel()"
      class="flex-1 rounded-field bg-field px-5 py-4 type-task-title font-semibold text-secondary focus-visible:focus-ring"
    >
      Cancel
    </button>
  </div>
</form>
