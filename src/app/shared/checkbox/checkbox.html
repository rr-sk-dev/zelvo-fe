<button
  type="button"
  role="checkbox"
  [attr.aria-checked]="checked()"
  [style.--checkbox-color]="color()"
  [style.width.px]="size()"
  [style.height.px]="size()"
  class="focus-visible:focus-ring"
  (click)="toggle()"
>
  @if (checked()) {
    <svg
      viewBox="0 0 24 24"
      fill="none"
      stroke="currentColor"
      stroke-width="3"
      stroke-linecap="round"
      stroke-linejoin="round"
      aria-hidden="true"
    >
      <path d="M5 13l4 4L19 7" />
    </svg>
  }
</button>
