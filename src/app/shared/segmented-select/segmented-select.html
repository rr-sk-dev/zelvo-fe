<fieldset [disabled]="disabled()">
  <legend class="type-body text-secondary">{{ legend() }}</legend>
  <div class="mt-2 grid grid-cols-3 gap-3">
    @for (option of options(); track option.value) {
      <label
        class="flex cursor-pointer items-center justify-center rounded-field border bg-card px-4 py-3 type-task-title has-[:focus-visible]:focus-ring"
        [class]="value() === option.value ? option.activeClass : 'border-transparent text-muted'"
      >
        <input
          type="radio"
          class="sr-only"
          [name]="groupName"
          [checked]="value() === option.value"
          (change)="select(option.value)"
          (blur)="touch.emit()"
        />
        {{ option.label }}
      </label>
    }
  </div>
</fieldset>
